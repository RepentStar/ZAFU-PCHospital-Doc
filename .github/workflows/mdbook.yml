name: Deploy Book
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-book:
    name: Build Book
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Run mdbook
        run: mdbook build

      - name: Upload book
        uses: actions/upload-artifact@v4
        with:
          path: book
          retention-days: "3"

      - name: Deploy Book
        uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          branch: gh-pages
          folder: book
          single-commit: true
